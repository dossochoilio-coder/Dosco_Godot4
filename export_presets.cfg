[preset.0]
name="Android Release (APK)"
platform="Android"
runnable=true
advanced_options=false
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter=""
export_path="builds/dosco.apk"
encryption_include_filters=""
encryption_exclude_filters=""
encrypt_pck=false
encrypt_directory=false
script_export_mode=1

[preset.0.options]

# --- FORMAT APK ---
gradle_build/use_gradle_build=false
gradle_build/export_format=0
gradle_build/min_sdk=""
gradle_build/target_sdk=""

# --- ARCHITECTURE ---
architectures/armeabi-v7a=false
architectures/arm64-v8a=true
architectures/x86=false
architectures/x86_64=false

# --- VERSION ---
version/code=1
version/name="1.0"

# --- APP ---
package/unique_name="com.dosco.labatailledesetoiles"
package/name="DOSCO"
package/signed=true
package/app_category=2

# --- ICONES (OBLIGATOIRES ⚠️) ---
launcher_icons/main_192x192="res://assets/icon_192.png"
launcher_icons/adaptive_foreground_432x432="res://assets/adaptive_foreground.png"
launcher_icons/adaptive_background_432x432="res://assets/adaptive_background.png"

# --- KEYSTORE ---
keystore/debug=""
keystore/debug_user=""
keystore/debug_password=""

keystore/release=""
keystore/release_user=""
keystore/release_password=""

# ⚠️ IMPORTANT :
# On laisse vide volontairement → les variables GitHub Actions prennent le relais

# --- SCREEN ---
screen/immersive_mode=true
screen/support_small=false
screen/support_normal=true
screen/support_large=true
screen/support_xlarge=true
screen/keep_screen_on=true

# --- PERMISSIONS ---
permissions/access_internet=true
permissions/access_network_state=true
permissions/vibrate=true

# --- DIVERS ---
command_line/extra_args=""
apk_expansion/enable=false
