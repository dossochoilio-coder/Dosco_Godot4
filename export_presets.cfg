[preset.0]
name="Android Release (APK)"
platform="Android"
runnable=true
dedicated_server=false
export_filter="all_resources"
include_filter=""
exclude_filter="*.import,*.tres~,*.gd~"
export_path="builds/DOSCO.apk"
encrypt_pck=false

[preset.0.options]
package/unique_name="com.dosco.labatailledesetoiles"
package/name="DOSCO"
package/signed=true
package/classify_as_game=true

# ✅ CONFIG KEYSTORE DEBUG (OBLIGATOIRE)
keystore/debug="true"
keystore/debug_user="androiddebugkey"
keystore/debug_password="android"
keystore/debug_path="res://debug.keystore"

# ✅ ICÔNES
launcher_icons/main_192x192="res://assets/icon_192.png"
launcher_icons/adaptive_foreground_432x432="res://assets/adaptive_foreground.png"
launcher_icons/adaptive_background_432x432="res://assets/adaptive_background.png"

# ✅ OPTIONS
graphics/opengl_debug=false
screen/immersive_mode=true
screen/support_small=false
screen/support_normal=true
screen/support_large=true
screen/keep_screen_on=true

permissions/access_internet=true
permissions/access_network_state=true
permissions/vibrate=true


