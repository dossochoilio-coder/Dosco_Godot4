name: Build DOSCO Android (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "DOSCO"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # === Setup Godot ===
      - name: Setup Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          export-templates: true

      # === Setup Android SDK ===
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cache: true

      # === Generate Debug Keystore ===
      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # === Decode Release Keystore (si présent) ===
      - name: Decode Release Keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > release.keystore
          chmod 600 release.keystore

      # === Prepare builds folder ===
      - name: Create builds directory
        run: mkdir -p builds

      # === Export APK (Release) ===
      - name: Export APK
        run: |
          godot --headless --export-release "Android Release (APK)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk

      # === Export AAB (Release) ===
      - name: Export AAB
        run: |
          godot --headless --export-release "Android Release (AAB)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab || echo "AAB export skipped or failed"

      # === Upload Artifacts ===
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          retention-days: 30

      # === Optional: Create GitHub Release ===
      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "DOSCO Build #${{ github.run_number }}"
          files: |
            builds/*.apk
            builds/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
