name: Build DOSCO Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.3
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore /root/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "Keystore: $(ls -lh /root/debug.keystore)"

      - name: Install export templates
        run: |
          TDIR="/github/home/.local/share/godot/export_templates/4.3.stable"
          mkdir -p "$TDIR"
          # Copier depuis l'image (barichello/godot-ci les met dans /root)
          if ls /root/.local/share/godot/export_templates/4.3.stable/ 2>/dev/null; then
            cp /root/.local/share/godot/export_templates/4.3.stable/* "$TDIR/" || true
            echo "Templates copiés depuis /root"
          fi
          # Si pas là, télécharger
          if [ ! -f "$TDIR/android_debug.apk" ]; then
            echo "Téléchargement des templates..."
            wget -q "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz" -O /tmp/tpl.tpz
            cd /tmp && unzip -q tpl.tpz
            cp /tmp/templates/* "$TDIR/"
          fi
          echo "Templates disponibles:"
          ls "$TDIR/" | grep android

      - name: Write complete editor settings
        run: |
          SDK="/github/home/.android/sdk"
          TDIR="/github/home/.local/share/godot/export_templates/4.3.stable"
          KEYSTORE="/root/debug.keystore"
          JAVA_HOME_PATH="$(dirname $(dirname $(readlink -f $(which java))))"
          mkdir -p /root/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\nexport/android/custom_build_sdk_path = "%s"\neditor/script/templates_search_path = "%s"\n' \
            "$SDK" "$KEYSTORE" "$SDK" "$TDIR" \
            > /root/.config/godot/editor_settings-4.tres
          echo "=== Editor settings ==="
          cat /root/.config/godot/editor_settings-4.tres
          echo "=== JAVA ==="
          java -version 2>&1 | head -1
          echo "=== Templates ==="
          ls "$TDIR/" | grep android

      - name: Import project
        run: |
          godot --headless --editor --quit \
            --path "$GITHUB_WORKSPACE" 2>&1 | tail -20 || true

      - name: Create builds dir
        run: mkdir -p "$GITHUB_WORKSPACE/builds"

      - name: Export APK
        run: |
          godot --headless \
            --export-debug "Android Release (APK)" \
            "$GITHUB_WORKSPACE/builds/DOSCO_$GITHUB_RUN_NUMBER.apk" \
            --path "$GITHUB_WORKSPACE" 2>&1
          ls -lh "$GITHUB_WORKSPACE/builds/" || true

      - name: Export AAB
        run: |
          godot --headless \
            --export-debug "Android Release (AAB)" \
            "$GITHUB_WORKSPACE/builds/DOSCO_$GITHUB_RUN_NUMBER.aab" \
            --path "$GITHUB_WORKSPACE" 2>&1 || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DOSCO v1.0.${{ github.run_number }}"
          files: builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
