name: Build DOSCO Android (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3.0"
  EXPORT_NAME: "DOSCO"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === Godot Setup - version standard, pas Mono ===
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.3.0
          use-dotnet: false
          include-templates: true

      # === Android SDK ===
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest"

      # === Configure Godot editor settings - FORMAT .tres VALIDE ===
      - name: Configure Godot Android editor settings
        run: |
          mkdir -p ~/.config/godot

          cat > ~/.config/godot/editor_settings-4.tres <<'EOF'
[gd_resource type="EditorSettings" format=3]

[resource]
export/android/android_sdk_path = "/usr/local/lib/android/sdk"
export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
EOF

          echo "=== editor_settings-4.tres ==="
          cat ~/.config/godot/editor_settings-4.tres

      # === Debug Keystore ===
      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

          echo "=== Keystore created ==="
          ls -la debug.keystore

      # === Patch export_presets.cfg for CI ===
      - name: Patch export_presets.cfg
        run: |
          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          preset_path = Path("export_presets.cfg")
          text = preset_path.read_text()

          workspace = os.environ["GITHUB_WORKSPACE"]
          keystore = f"{workspace}/debug.keystore"

          # Nettoyer toutes les anciennes lignes keystore pour éviter les configurations partielles.
          text = re.sub(
              r'(?m)^keystore/(debug|debug_user|debug_password|debug_path|release|release_user|release_password)=.*\n?',
              '',
              text
          )

          # Forcer la signature.
          text = re.sub(
              r'(?m)^package/signed=(true|false)',
              'package/signed=true',
              text
          )

          keystore_block = (
              f'keystore/debug="{keystore}"\n'
              f'keystore/debug_user="androiddebugkey"\n'
              f'keystore/debug_password="android"\n'
              f'keystore/release="{keystore}"\n'
              f'keystore/release_user="androiddebugkey"\n'
              f'keystore/release_password="android"\n'
          )

          # Ajouter le bloc keystore dans chaque preset Android, juste après package/classify_as_game=true.
          text = text.replace(
              'package/classify_as_game=true\n',
              'package/classify_as_game=true\n' + keystore_block + '\n'
          )

          preset_path.write_text(text)
          PY

          echo "=== Patched export_presets.cfg keystore lines ==="
          grep -n "keystore/" export_presets.cfg || true

          echo "=== Package signed lines ==="
          grep -n "package/signed" export_presets.cfg || true

      # === Build Directory ===
      - name: Create builds directory
        run: mkdir -p builds

      # === Check Godot configuration ===
      - name: Show Godot version
        run: |
          godot --version
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la /usr/local/lib/android/sdk || true
          ls -la /usr/lib/jvm || true

      # === Validate Project ===
      - name: Validate project
        run: godot --headless --verbose --quit

      # === Export APK ===
      - name: Export APK (Release)
        run: |
          godot --headless --verbose --export-release "Android Release (APK)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk

      # === Export AAB ===
      - name: Export AAB (Release)
        run: |
          godot --headless --verbose --export-release "Android Release (AAB)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab

      # === Upload APK ===
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30

      # === Upload AAB ===
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          retention-days: 30
``
