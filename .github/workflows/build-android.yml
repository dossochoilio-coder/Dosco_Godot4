name: Build DOSCO Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "DOSCO"

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Cache ────────────────────────────────────────────────────
      - name: Cache Godot
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-android-v3

      # ── Godot ────────────────────────────────────────────────────
      - name: Install Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/
          sudo mv "/tmp/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          TDIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TDIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          cd /tmp && unzip -q templates.tpz
          mv /tmp/templates/* "$TDIR/"

      # ── Java + Android SDK ───────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;23.2.8568313"

      # ── Keystore debug ───────────────────────────────────────────
      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore "${{ github.workspace }}/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # ── Godot editor settings (sans heredoc) ─────────────────────
      - name: Configure Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          printf '[gd_resource type="EditorSettings" format=3]\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/debug_keystore = "%s"\nexport/android/debug_keystore_user = "androiddebugkey"\nexport/android/debug_keystore_pass = "android"\n' \
            "$ANDROID_SDK_ROOT" \
            "${{ github.workspace }}/debug.keystore" \
            > "$HOME/.config/godot/editor_settings-4.tres"
          cat "$HOME/.config/godot/editor_settings-4.tres"

      # ── Android build template ───────────────────────────────────
      - name: Install Android build template
        run: |
          TDIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          if [ -f "$TDIR/android_source.zip" ]; then
            mkdir -p "${{ github.workspace }}/android/build"
            unzip -q "$TDIR/android_source.zip" -d "${{ github.workspace }}/android/build/" || true
          fi
          mkdir -p "${{ github.workspace }}/android/build"
          echo "Build template ready"

      # ── Import ───────────────────────────────────────────────────
      - name: Import project
        run: |
          timeout 120 godot --headless --editor --quit --path "${{ github.workspace }}" 2>&1 | tail -20 || true

      # ── Build ────────────────────────────────────────────────────
      - name: Create builds dir
        run: mkdir -p "${{ github.workspace }}/builds"

      - name: Export APK
        run: |
          godot --headless --export-debug "Android Release (APK)" \
            "${{ github.workspace }}/builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk" \
            --path "${{ github.workspace }}" 2>&1
          ls -lh "${{ github.workspace }}/builds/" || true

      - name: Export AAB
        run: |
          godot --headless --export-debug "Android Release (AAB)" \
            "${{ github.workspace }}/builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab" \
            --path "${{ github.workspace }}" 2>&1 || true

      # ── Artifacts ────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DOSCO v1.0.${{ github.run_number }}"
          files: builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
