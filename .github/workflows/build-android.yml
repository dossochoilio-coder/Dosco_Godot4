name: Build DOSCO Android APK AAB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3.0"
  EXPORT_NAME: "DOSCO"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: "4.3.0"
          use-dotnet: false
          include-templates: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest"

      - name: Configure Godot Android editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          printf '%s\n' '[gd_resource type="EditorSettings" format=3]' > "$HOME/.config/godot/editor_settings-4.tres"
          printf '%s\n' '' >> "$HOME/.config/godot/editor_settings-4.tres"
          printf '%s\n' '[resource]' >> "$HOME/.config/godot/editor_settings-4.tres"
          printf '%s\n' 'export/android/android_sdk_path = "/usr/local/lib/android/sdk"' >> "$HOME/.config/godot/editor_settings-4.tres"
          printf '%s\n' 'export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"' >> "$HOME/.config/godot/editor_settings-4.tres"
          cat "$HOME/.config/godot/editor_settings-4.tres"

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          ls -la debug.keystore

      - name: Patch export_presets.cfg
        run: |
          perl -0pi -e 's/^keystore\/(debug|debug_user|debug_password|debug_path|release|release_user|release_password)=.*\n?//mg' export_presets.cfg
          perl -0pi -e 's/^package\/signed=(true|false)/package\/signed=true/mg' export_presets.cfg
          python3 -c "from pathlib import Path; import os; p=Path('export_presets.cfg'); t=p.read_text(); ks=os.environ['GITHUB_WORKSPACE'] + '/debug.keystore'; block='keystore/debug=\"' + ks + '\"\\nkeystore/debug_user=\"androiddebugkey\"\\nkeystore/debug_password=\"android\"\\nkeystore/release=\"' + ks + '\"\\nkeystore/release_user=\"androiddebugkey\"\\nkeystore/release_password=\"android\"\\n'; t=t.replace('package/classify_as_game=true\\n', 'package/classify_as_game=true\\n' + block + '\\n'); p.write_text(t)"
          echo "=== Keystore lines ==="
          grep -n "keystore/" export_presets.cfg || true
          echo "=== Signed lines ==="
          grep -n "package/signed" export_presets.cfg || true

      - name: Create builds directory
        run: |
          mkdir -p builds

      - name: Show Godot and Android info
        run: |
          godot --version
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la /usr/local/lib/android/sdk
          ls -la /usr/lib/jvm

      - name: Validate project
        run: |
          godot --headless --verbose --quit

      - name: Export APK Release
        run: |
          godot --headless --verbose --export-release "Android Release (APK)" "builds/${EXPORT_NAME}_${GITHUB_RUN_NUMBER}.apk"

      - name: Export AAB Release
        run: |
          godot --headless --verbose --export-release "Android Release (AAB)" "builds/${EXPORT_NAME}_${GITHUB_RUN_NUMBER}.aab"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          retention-days: 30
``
