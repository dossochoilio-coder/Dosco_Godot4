name: Build DOSCO Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  EXPORT_NAME: "DOSCO"
  EXPORT_PRESET: "Android Release (APK)"
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "4.3-stable"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ JAVA
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ✅ ANDROID SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses

      # ✅ GODOT
      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip
          unzip -q Godot_v${GODOT_RELEASE}_linux.x86_64.zip
          chmod +x Godot_v${GODOT_RELEASE}_linux.x86_64
          sudo mv Godot_v${GODOT_RELEASE}_linux.x86_64 /usr/local/bin/godot
          godot --version

      # ✅ TEMPLATES
      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz
          unzip -q -o Godot_v${GODOT_RELEASE}_export_templates.tpz
          cp templates/android_debug.apk ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          cp templates/android_release.apk ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      # ✅ CONFIG ANDROID GODOT
      - name: Configure Godot Android SDK paths
        run: |
          mkdir -p ~/.config/godot
          echo '[gd_resource type="EditorSettings" format=3]' > ~/.config/godot/editor_settings-4.tres
          echo '[resource]' >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/java_sdk_path = \"$JAVA_HOME\"" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> ~/.config/godot/editor_settings-4.tres

      # ✅ KEYSTORES
      - name: Generate keystores
        run: |
          keytool -genkeypair -v -keystore release.keystore -alias dosco -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=DOSCO,O=DOSCO,C=CI"
          keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      # ✅ EXPORT
      - name: Export APK
        run: |
          mkdir -p builds
          godot --headless --verbose --export-release "$EXPORT_PRESET" "builds/${EXPORT_NAME}_${GITHUB_RUN_NUMBER}.apk"

      # ✅ UPLOAD
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: builds/*.apk
``
