name: Build DOSCO Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "4.3-stable"
  EXPORT_NAME: "DOSCO"
  EXPORT_PRESET: "Android Release (APK)"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Android packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Download Godot Editor
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          chmod +x "Godot_v${GODOT_RELEASE}_linux.x86_64"
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -q -o "Godot_v${GODOT_RELEASE}_export_templates.tpz"
          cp templates/android_debug.apk "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"
          cp templates/android_release.apk "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"
          ls -la "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Configure Godot Android editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          {
            echo '[gd_resource type="EditorSettings" format=3]'
            echo '[resource]'
            printf 'export/android/java_sdk_path = "%s"\n' "$JAVA_HOME"
            echo 'export/android/android_sdk_path = "/usr/local/lib/android/sdk"'
          } > "$HOME/.config/godot/editor_settings-4.tres"
          cat "$HOME/.config/godot/editor_settings-4.tres"

      - name: Generate Release Keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.keystore \
            -alias dosco \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=DOSCO,O=DOSCO,C=CI"
          keytool -list -keystore release.keystore -alias dosco -storepass android

      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Create builds folder
        run: mkdir -p builds

      - name: Export APK
        run: |
          godot --headless --verbose --export-release "$EXPORT_PRESET" "builds/${EXPORT_NAME}_${GITHUB_RUN_NUMBER}.apk"
          ls -lah builds

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30
``
