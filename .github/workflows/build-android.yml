name: Build DOSCO Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.3
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Write editor settings
        run: |
          mkdir -p /root/.config/godot
          SDK_PATH="${ANDROID_SDK_ROOT:-/github/home/.android/sdk}"
          printf '[gd_resource type="EditorSettings" format=3]\n[resource]\nexport/android/android_sdk_path = "%s"\n' \
            "$SDK_PATH" > /root/.config/godot/editor_settings-4.tres
          echo "=== SDK: $SDK_PATH ==="
          cat /root/.config/godot/editor_settings-4.tres

      - name: Import project
        run: |
          godot --headless --editor --quit \
            --path "$GITHUB_WORKSPACE" 2>&1 | tail -20 || true

      - name: Create builds dir
        run: mkdir -p "$GITHUB_WORKSPACE/builds"

      - name: Export APK
        run: |
          godot --headless \
            --export-debug "Android Release (APK)" \
            "$GITHUB_WORKSPACE/builds/DOSCO_$GITHUB_RUN_NUMBER.apk" \
            --path "$GITHUB_WORKSPACE" 2>&1
          ls -lh "$GITHUB_WORKSPACE/builds/" || true

      - name: Export AAB
        run: |
          godot --headless \
            --export-debug "Android Release (AAB)" \
            "$GITHUB_WORKSPACE/builds/DOSCO_$GITHUB_RUN_NUMBER.aab" \
            --path "$GITHUB_WORKSPACE" 2>&1 || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DOSCO v1.0.${{ github.run_number }}"
          files: builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
