name: Build DOSCO Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "DOSCO"

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-android-v6

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/
          sudo mv "/tmp/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install Export Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          TDIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TDIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          cd /tmp && unzip -q templates.tpz
          mv /tmp/templates/* "$TDIR/"
          ls "$TDIR/" | grep android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Debug SDK paths
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "--- Contenu SDK ---"
          ls "$ANDROID_SDK_ROOT/" | head -10
          echo "--- platforms ---"
          ls "$ANDROID_SDK_ROOT/platforms/" 2>/dev/null || echo "MANQUANT"
          echo "--- build-tools ---"
          ls "$ANDROID_SDK_ROOT/build-tools/" 2>/dev/null || echo "MANQUANT"

      - name: Write Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          python3 -c "
          import os
          sdk = os.environ.get('ANDROID_SDK_ROOT', '/usr/local/lib/android/sdk')
          lines = [
              '[gd_resource type=\"EditorSettings\" format=3]',
              '[resource]',
              'export/android/android_sdk_path = \"' + sdk + '\"',
          ]
          content = '\n'.join(lines) + '\n'
          path = os.path.expanduser('~/.config/godot/editor_settings-4.tres')
          with open(path, 'w') as f:
              f.write(content)
          print('Ecrit dans:', path)
          print(content)
          "

      - name: Import project
        run: |
          timeout 120 godot --headless --editor --quit \
            --path "${{ github.workspace }}" 2>&1 | tail -30 || true

      - name: Debug after import
        run: |
          echo "--- editor_settings ---"
          cat "$HOME/.config/godot/editor_settings-4.tres"
          echo "--- .import dir ---"
          ls "${{ github.workspace }}/.import/" 2>/dev/null | head -5 || echo "Pas de .import"
          echo "--- export_presets.cfg ---"
          cat "${{ github.workspace }}/export_presets.cfg"

      - name: Create builds dir
        run: mkdir -p "${{ github.workspace }}/builds"

      - name: Export APK
        run: |
          godot --headless \
            --export-debug "Android Release (APK)" \
            "${{ github.workspace }}/builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk" \
            --path "${{ github.workspace }}" 2>&1
          ls -lh "${{ github.workspace }}/builds/" || true

      - name: Export AAB
        run: |
          godot --headless \
            --export-debug "Android Release (AAB)" \
            "${{ github.workspace }}/builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab" \
            --path "${{ github.workspace }}" 2>&1 || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DOSCO v1.0.${{ github.run_number }}"
          files: builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
