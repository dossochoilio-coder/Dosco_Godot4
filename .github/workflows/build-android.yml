name: Build DOSCO Android (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3.0"
  EXPORT_NAME: "DOSCO"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === Godot Setup ===
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.3.0
          use-dotnet: false
          include-templates: true

      # === Android SDK ===
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Android SDK packages
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # ✅ CONFIG GODOT ANDROID (CRUCIAL)
      - name: Configure Godot Android paths
        run: |
          mkdir -p ~/.config/godot
          echo '
          
          [export/android]
          android_sdk_path="/usr/local/lib/android/sdk"
          android_sdk_build_tools="34.0.0"
          android_sdk_platform="android-34"
          java_sdk_path="/usr/lib/jvm/java-17-openjdk-amd64"
          ' > ~/.config/godot/editor_settings-4.tres

      # === Debug Keystore ===
      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # ✅ RENDRE LE KEYSTORE VISIBLE A GODOT
      - name: Move keystore for Godot
        run: |
          cp debug.keystore ./debug.keystore

      # === Release Keystore (optionnel) ===
      - name: Decode Release Keystore
        continue-on-error: true
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || '' }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            chmod 600 release.keystore
            echo "✅ Release keystore decoded"
          else
            echo "ℹ️ No release keystore provided - using debug keystore"
          fi

      # === Build Directory ===
      - name: Create builds directory
        run: mkdir -p builds

      # ✅ VALIDATION (EVITE LES ERREURS CACHÉES)
      - name: Validate project
        run: godot --headless --quit

      # === EXPORT APK ===
      - name: Export APK (Release)
        run: |
          godot --headless --export-release "Android Release (APK)" \
          builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk

      # === EXPORT AAB ===
      - name: Export AAB (Release)
        run: |
          godot --headless --export-release "Android Release (AAB)" \
          builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab || echo "AAB export skipped"

      # === Upload APK ===
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30

      # === Upload AAB ===
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          retention-days: 30
``
