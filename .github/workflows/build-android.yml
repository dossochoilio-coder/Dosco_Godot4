name: Build APK Test

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses > /dev/null

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q -o Godot_v4.3-stable_export_templates.tpz
          cp templates/android_debug.apk ~/.local/share/godot/export_templates/4.3.stable/
          cp templates/android_release.apk ~/.local/share/godot/export_templates/4.3.stable/

      - name: Configure Godot paths
        run: |
          mkdir -p ~/.config/godot
          echo '[gd_resource type="EditorSettings" format=3]' > ~/.config/godot/editor_settings-4.tres
          echo '[resource]' >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/java_sdk_path = \"$JAVA_HOME\"" >> ~/.config/godot/editor_settings-4.tres
          echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> ~/.config/godot/editor_settings-4.tres

      - name: Force unsigned preset
        run: |
          sed -i 's|package/signed=.*|package/signed=false|g' export_presets.cfg
          sed -i 's|keystore/.*=.*|keystore/debug=""|g' export_presets.cfg || true

      - name: Import project
        run: |
          godot --headless --editor --quit

      - name: Export APK (unsigned)
        run: |
          mkdir builds
          godot --headless --verbose --export-release "Android Release (APK)" "builds/app.apk"
          ls -lah builds

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: builds/app.apk
