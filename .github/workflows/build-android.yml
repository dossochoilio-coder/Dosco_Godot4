name: Build DOSCO Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "4.3-stable"
  EXPORT_NAME: "DOSCO"
  EXPORT_PRESET: "Android Release (APK)"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 70

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Download Godot editor
        shell: bash
        run: |
          set -e
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          chmod +x "Godot_v${GODOT_RELEASE}_linux.x86_64"
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        shell: bash
        run: |
          set -e
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -q -o "Godot_v${GODOT_RELEASE}_export_templates.tpz"
          cp templates/android_debug.apk "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_debug.apk"
          cp templates/android_release.apk "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_release.apk"
          ls -la "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"

      - name: Configure Godot Android paths
        shell: bash
        run: |
          set -e
          mkdir -p "$HOME/.config/godot"
          SETTINGS_FILE="$HOME/.config/godot/editor_settings-4.tres"
          echo '[gd_resource type="EditorSettings" format=3]' > "$SETTINGS_FILE"
          echo '[resource]' >> "$SETTINGS_FILE"
          echo "export/android/java_sdk_path = \"$JAVA_HOME\"" >> "$SETTINGS_FILE"
          echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> "$SETTINGS_FILE"
          cat "$SETTINGS_FILE"

      - name: Generate Android keystores
        shell: bash
        run: |
          set -e
          keytool -genkeypair -v -keystore release.keystore -alias dosco -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=DOSCO,O=DOSCO,C=CI"
          keytool -genkeypair -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          keytool -list -keystore release.keystore -alias dosco -storepass android
          keytool -list -keystore debug.keystore -alias androiddebugkey -storepass android

      - name: Validate files before export
        shell: bash
        run: |
          set -e
          test -f export_presets.cfg
          test -f release.keystore
          test -f debug.keystore
          grep -n 'name="Android Release (APK)"' export_presets.cfg
          grep -n 'gradle_build/export_format=0' export_presets.cfg
          grep -n 'keystore/release="release.keystore"' export_presets.cfg
          grep -n 'keystore/debug="debug.keystore"' export_presets.cfg

      - name: Export APK
        shell: bash
        run: |
          set -e
          mkdir -p builds
          godot --headless --verbose --export-release "$EXPORT_PRESET" "builds/${EXPORT_NAME}_${GITHUB_RUN_NUMBER}.apk"
          ls -lah builds

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: "builds/*.apk"
          retention-days: 30
