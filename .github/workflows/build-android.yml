name: Build DOSCO Android

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3.0"
  EXPORT_NAME: "DOSCO"

jobs:
  build:
    name: Build Android APK and AAB
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: "4.3.0"
          use-dotnet: false
          include-templates: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "cmdline-tools;latest"

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Clean Android signing lines in export presets
        run: |
          sed -i '/^keystore\//d' export_presets.cfg
          sed -i 's/package\/signed=false/package\/signed=true/g' export_presets.cfg
          echo "=== package signed lines ==="
          grep -n "package/signed" export_presets.cfg || true
          echo "=== keystore lines after cleanup ==="
          grep -n "keystore/" export_presets.cfg || true

      - name: Create builds directory
        run: |
          mkdir -p builds

      - name: Show tool versions
        run: |
          godot --version
          echo "ANDROID_HOME=${ANDROID_HOME}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}"
          ls -la debug.keystore

      - name: Validate Godot project
        run: |
          godot --headless --quit

      - name: Export APK
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: "${{ github.workspace }}/debug.keystore"
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: "androiddebugkey"
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: "android"
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: "${{ github.workspace }}/debug.keystore"
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: "androiddebugkey"
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: "android"
          
          # ✅ AJOUT CRITIQUE
          GODOT_ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          GODOT_ANDROID_JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

        run: |
          godot --headless --verbose --export-release "Android Release (APK)" "builds/${EXPORT_NAME}_${GITHUB_RUN_NUMBER}.apk"

      - name: Export AAB
        env:
          GODOT_ANDROID_KEYSTORE_DEBUG_PATH: "${{ github.workspace }}/debug.keystore"
          GODOT_ANDROID_KEYSTORE_DEBUG_USER: "androiddebugkey"
          GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD: "android"
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: "${{ github.workspace }}/debug.keystore"
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: "androiddebugkey"
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: "android"

        # ✅ AJOUT CRITIQUE
          GODOT_ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          GODOT_ANDROID_JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

        run: |
          godot --headless --verbose --export-release "Android Release (AAB)" "builds/${EXPORT_NAME}_${GITHUB_RUN_NUMBER}.aab"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK
          path: builds/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB
          path: builds/*.aab
          retention-days: 30
