name: Build DOSCO Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "DOSCO"

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot
        uses: actions/cache@v4
        id: cache-godot
        with:
          path: |
            /usr/local/bin/godot
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-android-v5

      - name: Install Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/
          sudo mv "/tmp/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Install Export Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          TDIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TDIR"
          wget -q "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" -O /tmp/templates.tpz
          cd /tmp && unzip -q templates.tpz
          mv /tmp/templates/* "$TDIR/"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Write Godot editor settings
        run: |
          mkdir -p "$HOME/.config/godot"
          python3 -c "
          import os
          sdk = os.environ.get('ANDROID_SDK_ROOT', '/usr/local/lib/android/sdk')
          content = '[gd_resource type=\"EditorSettings\" format=3]\n[resource]\nexport/android/android_sdk_path = \"' + sdk + '\"\n'
          with open(os.path.expanduser('~/.config/godot/editor_settings-4.tres'), 'w') as f:
              f.write(content)
          print('SDK path:', sdk)
          print(content)
          "

      - name: Import project
        run: |
          timeout 120 godot --headless --editor --quit --path "${{ github.workspace }}" 2>&1 | tail -20 || true

      - name: Create builds dir
        run: mkdir -p "${{ github.workspace }}/builds"

      - name: Export APK
        run: |
          godot --headless \
            --export-debug "Android Release (APK)" \
            "${{ github.workspace }}/builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk" \
            --path "${{ github.workspace }}" 2>&1
          ls -lh "${{ github.workspace }}/builds/" || true

      - name: Export AAB
        run: |
          godot --headless \
            --export-debug "Android Release (AAB)" \
            "${{ github.workspace }}/builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab" \
            --path "${{ github.workspace }}" 2>&1 || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DOSCO v1.0.${{ github.run_number }}"
          files: builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
