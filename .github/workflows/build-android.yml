name: Build DOSCO Android (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'debug'
        type: choice
        options: [debug, release]

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "DOSCO"
  PROJECT_PATH: "."

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      # ── Cache Godot + templates ─────────────────────────────────
      - name: Cache Godot binaries
        uses: actions/cache@v4
        id: godot-cache
        with:
          path: |
            ~/.local/share/godot
            /usr/local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}-linux

      - name: Download Godot ${{ env.GODOT_VERSION }}
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip"
          wget -q "$GODOT_URL" -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot_bin
          sudo mv /tmp/godot_bin/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

      - name: Download Export Templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz"
          wget -q "$TEMPLATES_URL" -O /tmp/templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q /tmp/templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      # ── Android SDK ─────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-34
            build-tools;34.0.0
            ndk;23.2.8568313
            cmake;3.22.1

      - name: Setup Android keystore (debug)
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "debug.keystore créé"

      - name: Setup Android keystore (release)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > release.keystore
          chmod 600 release.keystore

      # ── Godot Android plugin ─────────────────────────────────────
      - name: Configure Godot Android export
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "${{ github.workspace }}/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      # ── Import projet ────────────────────────────────────────────
      - name: Import project resources
        run: |
          godot --headless --editor --quit 2>/dev/null || true
          echo "Import terminé"

      # ── Build APK ───────────────────────────────────────────────
      - name: Create builds directory
        run: mkdir -p builds

      - name: Export APK (debug)
        run: |
          godot --headless \
            --export-debug "Android Release (APK)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk \
            2>&1 | tail -20
          ls -lh builds/

      - name: Export AAB (debug)
        run: |
          godot --headless \
            --export-debug "Android Release (AAB)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab \
            2>&1 | tail -20 || echo "AAB optionnel ignoré"

      # ── Artifacts ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          retention-days: 30
          if-no-files-found: warn

      # ── GitHub Release (sur push main) ──────────────────────────
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DOSCO v1.0.${{ github.run_number }}"
          body: |
            ## DOSCO — La Bataille des Étoiles
            Build automatique depuis GitHub Actions
            - Godot ${{ env.GODOT_VERSION }}
            - Android SDK 34
          files: |
            builds/*.apk
            builds/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
