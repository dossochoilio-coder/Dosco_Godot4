name: Build DOSCO Android (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3.0"
  EXPORT_NAME: "DOSCO"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === Godot ===
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          include-templates: true

      # === Android SDK ===
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Android SDK packages
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # === Debug Keystore ===
      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      # === Release Keystore (version tolérante aux erreurs) ===
      - name: Decode Release Keystore
        continue-on-error: true
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || '' }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore 2>/dev/null && \
            chmod 600 release.keystore && \
            echo "✅ Release keystore decoded successfully" || \
            echo "⚠️ Failed to decode release keystore (invalid base64)"
          else
            echo "ℹ️ No release keystore secret found - using debug keystore only"
          fi

      # === Build ===
      - name: Create builds directory
        run: mkdir -p builds

      - name: Export APK
        run: |
          godot --headless --export-release "Android Release (APK)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk

      - name: Export AAB
        run: |
          godot --headless --export-release "Android Release (AAB)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab || echo "AAB export skipped"

      # === Upload Artifacts ===
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          retention-days: 30
