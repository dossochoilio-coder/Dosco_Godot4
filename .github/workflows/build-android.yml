name: Build DOSCO Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

env:
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "4.3-stable"
  EXPORT_NAME: "DOSCO"
  EXPORT_PRESET: "Android Release (APK)"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 70

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses > /dev/null || true

      - name: Download Godot editor
        shell: bash
        run: |
          set -e
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          chmod +x "Godot_v${GODOT_RELEASE}_linux.x86_64"
          sudo mv "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot
          godot --version

      - name: Install Godot export templates
        shell: bash
        run: |
          set -e
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_export_templates.tpz"
          unzip -q -o "Godot_v${GODOT_RELEASE}_export_templates.tpz"
          cp templates/android_debug.apk "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_debug.apk"
          cp templates/android_release.apk "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_release.apk"
          test -f "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_debug.apk"
          test -f "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/android_release.apk"

      - name: Configure Godot Android paths
        shell: bash
        run: |
          set -e
          mkdir -p "$HOME/.config/godot"
          SETTINGS_FILE="$HOME/.config/godot/editor_settings-4.tres"
          echo '[gd_resource type="EditorSettings" format=3]' > "$SETTINGS_FILE"
          echo '[resource]' >> "$SETTINGS_FILE"
          echo "export/android/java_sdk_path = \"$JAVA_HOME\"" >> "$SETTINGS_FILE"
          echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> "$SETTINGS_FILE"
          cat "$SETTINGS_FILE"

      - name: Generate Android keystores
        shell: bash
        run: |
          set -e
          keytool -genkeypair -v -keystore "$GITHUB_WORKSPACE/release.keystore" -alias dosco -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=DOSCO,O=DOSCO,C=CI"
          keytool -genkeypair -v -keystore "$GITHUB_WORKSPACE/debug.keystore" -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
          keytool -list -keystore "$GITHUB_WORKSPACE/release.keystore" -alias dosco -storepass android
          keytool -list -keystore "$GITHUB_WORKSPACE/debug.keystore" -alias androiddebugkey -storepass android

      - name: Force absolute keystore paths in Godot preset
        shell: bash
        run: |
          set -e
          test -f export_presets.cfg
          sed -i 's|^package/signed=.*|package/signed=true|' export_presets.cfg
          sed -i "s|^keystore/debug=.*|keystore/debug=\"$GITHUB_WORKSPACE/debug.keystore\"|" export_presets.cfg
          sed -i 's|^keystore/debug_user=.*|keystore/debug_user="androiddebugkey"|' export_presets.cfg
          sed -i 's|^keystore/debug_password=.*|keystore/debug_password="android"|' export_presets.cfg
          sed -i "s|^keystore/release=.*|keystore/release=\"$GITHUB_WORKSPACE/release.keystore\"|" export_presets.cfg
          sed -i 's|^keystore/release_user=.*|keystore/release_user="dosco"|' export_presets.cfg
          sed -i 's|^keystore/release_password=.*|keystore/release_password="android"|' export_presets.cfg
          grep -nE 'package/signed|keystore/debug|keystore/release|gradle_build/export_format|gradle_build/use_gradle_build' export_presets.cfg

      - name: Validate files before export
        shell: bash
        run: |
          set -e
          test -f project.godot
          test -f export_presets.cfg
          test -f "$GITHUB_WORKSPACE/release.keystore"
          test -f "$GITHUB_WORKSPACE/debug.keystore"
          test -f assets/icon_192.png
          test -f assets/adaptive_foreground.png
          test -f assets/adaptive_background.png

      - name: Import project once before export
        shell: bash
        run: |
          set -e
          godot --headless --editor --quit

      - name: Export APK
        shell: bash
        run: |
          set -e
          mkdir -p builds
          godot --headless --verbose --export-release "$EXPORT_PRESET" "builds/${EXPORT_NAME}_${GITHUB_RUN_NUMBER}.apk"
          test -f "builds/${EXPORT_NAME}_${GITHUB_RUN_NUMBER}.apk"
          ls -lah builds

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dosco-apk
          path: "builds/*.apk"
          retention-days: 30
``
