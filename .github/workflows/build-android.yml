name: Build DOSCO Android (APK + AAB) - Manual

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  EXPORT_NAME: "DOSCO"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === Godot Editor Standard ===
      - name: Download Godot Editor
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          unzip -q Godot_v4.3-stable_linux.x86_64.zip
          chmod +x Godot_v4.3-stable_linux.x86_64
          sudo mv Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot

      # === Export Templates (placement précis) ===
      - name: Download and Install Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.3.stable
          wget -q https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          unzip -q -o Godot_v4.3-stable_export_templates.tpz
          mv templates/android_debug.apk ~/.local/share/godot/export_templates/4.3.stable/
          mv templates/android_release.apk ~/.local/share/godot/export_templates/4.3.stable/
          ls -la ~/.local/share/godot/export_templates/4.3.stable/

      # === Android SDK ===
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Android packages
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # === Keystores ===
      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Decode Release Keystore
        continue-on-error: true
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || '' }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            chmod 600 release.keystore
          fi

      - name: Create builds folder
        run: mkdir -p builds

      # === Export ===
      - name: Export APK
        run: |
          godot --headless --export-release "Android Release (APK)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk

      - name: Export AAB
        run: |
          godot --headless --export-release "Android Release (AAB)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab || echo "AAB skipped"

      # === Upload ===
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          retention-days: 30
