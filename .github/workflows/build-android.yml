name: Build DOSCO Android (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3.0"
  EXPORT_NAME: "DOSCO"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === 1. Installation de .NET SDK et du workload Android ===
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install .NET Android Workload
        run: sudo dotnet workload install android

      # === 2. Installation de Java JDK 17 ===
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # === 3. Configuration de Godot Engine (Version Mono) ===
      - name: Setup Godot Mono
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-mono: true
          include-templates: true

      # === 4. Configuration complète d'Android SDK ===
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Android packages
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

      # === 5. Génération et décodage des Keystores ===
      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Decode Release Keystore
        continue-on-error: true
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || '' }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            chmod 600 release.keystore
          fi

      - name: Fallback Keystore Verification
        run: |
          if [ ! -f release.keystore ]; then
            echo "Utilisation du keystore de debug comme fallback."
            cp debug.keystore release.keystore
          fi

      # === 6. CORRECTION CRITIQUE : Fichier EditorSettings Godot 4 ===
      - name: Configure Godot Editor Settings
        run: |
          mkdir -p ~/.config/godot
          
          # Godot 4 exige le suffixe "-4.tres" et une structure de ressource formelle
          cat <<EOF > ~/.config/godot/editor_settings-4.tres
          [gd_resource type="EditorSettings" format=3]
          
          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/debug_keystore = "${GITHUB_WORKSPACE}/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/shutdown_adb_on_exit = true
          EOF
          
          # Par précaution, on clone le fichier pour la version mineure 4.3
          cp ~/.config/godot/editor_settings-4.tres ~/.config/godot/editor_settings-4.3.tres

      # === 7. Configuration dynamique des Presets ===
      - name: Configure Keystore Secrets in Presets
        env:
          RELEASE_ALIAS: ${{ secrets.ANDROID_RELEASE_ALIAS || 'androiddebugkey' }}
          RELEASE_PASSWORD: ${{ secrets.ANDROID_RELEASE_PASSWORD || 'android' }}
        run: |
          sed -i "s/RELEASE_ALIAS_PLACEHOLDER/$RELEASE_ALIAS/g" export_presets.cfg
          sed -i "s/RELEASE_PASSWORD_PLACEHOLDER/$RELEASE_PASSWORD/g" export_presets.cfg

      - name: Create builds folder
        run: mkdir -p builds

      # === 8. Exportations ===
      - name: Export APK
        run: |
          godot --headless --export-release "Android Release (APK)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk

      - name: Export AAB
        run: |
          godot --headless --export-release "Android Release (AAB)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab || echo "AAB skipped"

      # === 9. Upload Artefacts ===
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          retention-days: 30
