name: Build DOSCO Android (APK + AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3.0"
  EXPORT_NAME: "DOSCO"

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # === 1. Installation de .NET SDK (Crucial pour Godot Mono) ===
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # === 2. Installation de Java JDK 17 (Requis pour Android SDK) ===
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # === 3. Configuration de Godot Engine (Version Mono) ===
      - name: Setup Godot Mono
        uses: chickensoft-games/setup-godot@v1
        with:
          version: ${{ env.GODOT_VERSION }}
          use-mono: true
          include-templates: true

      # === 4. Configuration complète d'Android SDK ===
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "latest"

      - name: Install Android packages
        run: |
          sdkmanager --update
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9519653"

      # === 5. Fix Master : Injection du chemin SDK dans Godot ===
      - name: Configure Godot Editor Settings
        run: |
          mkdir -p ~/.config/godot
          echo '[editor_settings]' > ~/.config/godot/editor_settings.tres
          echo 'export/android/android_sdk_path = "'"$ANDROID_HOME"'"' >> ~/.config/godot/editor_settings.tres
          echo 'export/android/shutdown_adb_on_exit = true' >> ~/.config/godot/editor_settings.tres

      # === 6. Génération et décodage des Keystores ===
      - name: Generate Debug Keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Decode Release Keystore
        continue-on-error: true
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || '' }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > release.keystore
            chmod 600 release.keystore
          fi

      - name: Create builds folder
        run: mkdir -p builds

      # === 7. Exportations ===
      - name: Export APK
        run: |
          godot --headless --export-release "Android Release (APK)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.apk

      - name: Export AAB
        run: |
          godot --headless --export-release "Android Release (AAB)" \
            builds/${{ env.EXPORT_NAME }}_${{ github.run_number }}.aab || echo "AAB skipped"

      # === 8. Sauvegarde des Artefacts ===
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-APK-${{ github.run_number }}
          path: builds/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: DOSCO-AAB-${{ github.run_number }}
          path: builds/*.aab
          retention-days: 30
